<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Struggling Trader — Journal</title>
<style>
  :root {
    --bg: #0e0e0e; --bg2: #161616; --bg3: #1e1e1e;
    --border: #2a2a2a; --text: #e8e8e8; --muted: #666;
    --gold: #c9a84c; --gold2: #f0c96a;
    --green: #4caf7d; --red: #e05c5c; --blue: #5b9bd5;
    --radius: 8px; --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-title { font-size: 15px; font-weight: 600; color: var(--gold); }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; overflow-x: auto; }
  .tab { padding: 10px 16px; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; white-space: nowrap; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .main { padding: 20px; max-width: 900px; margin: 0 auto; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; color: var(--muted); }
  input, select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 8px 10px; width: 100%; font-family: var(--font); outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  select option { background: var(--bg3); }
  textarea { resize: vertical; min-height: 60px; }
  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .rule-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; user-select: none; }
  .rule-item.checked { border-color: var(--green); background: rgba(76,175,125,0.07); }
  .rule-item.checked .rule-dot { background: var(--green); }
  .rule-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .rule-text { font-size: 12px; }
  .btn { background: var(--gold); color: #000; border: none; border-radius: 6px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; transition: background 0.15s; }
  .btn:hover { background: var(--gold2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .gold-text { color: var(--gold); } .green-text { color: var(--green); } .red-text { color: var(--red); } .blue-text { color: var(--blue); }
  .trade-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
  .trade-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; flex-wrap: wrap; gap: 6px; }
  .trade-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .badge-long { background: rgba(91,155,213,0.2); color: var(--blue); }
  .badge-short { background: rgba(192,93,93,0.2); color: #e07070; }
  .badge-win { background: rgba(76,175,125,0.2); color: var(--green); }
  .badge-loss { background: rgba(224,92,92,0.2); color: var(--red); }
  .badge-be { background: rgba(150,150,150,0.2); color: var(--muted); }
  .trade-date { font-size: 11px; color: var(--muted); }
  .trade-pips { font-size: 15px; font-weight: 600; }
  .trade-rules { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .rule-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
  .rule-ok { background: rgba(76,175,125,0.15); color: var(--green); }
  .rule-broken { background: rgba(224,92,92,0.15); color: var(--red); }
  .trade-note { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
  .delete-btn:hover { color: var(--red); }
  .rule-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .rule-name { font-size: 12px; width: 220px; flex-shrink: 0; }
  .bar-wrap { flex: 1; background: var(--bg3); border-radius: 20px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 20px; transition: width 0.4s; }
  .rule-pct { font-size: 12px; font-weight: 600; width: 40px; text-align: right; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .month-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .month-table th { text-align: left; font-size: 11px; color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--border); font-weight: 500; }
  .month-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .month-table tr:last-child td { border-bottom: none; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-status { font-size: 11px; color: var(--muted); }
  .sync-status.ok { color: var(--green); }
  .sync-status.err { color: var(--red); }
  .edit-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; }
  .edit-btn:hover { color: var(--gold); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 14px; font-weight: 600; color: var(--gold); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  .modal-close:hover { color: var(--red); }
  .modal-footer { display: flex; gap: 10px; margin-top: 14px; }
  .modal-footer .btn { margin-top: 0; }
  .btn-cancel { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
  .btn-cancel:hover { border-color: var(--gold); }
  @media (max-width: 600px) {
    .form-grid.three { grid-template-columns: 1fr 1fr; }
    .rules-grid { grid-template-columns: 1fr; }
    .rule-name { width: 160px; }
    .header-right { gap: 6px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">⚔️ The Struggling Trader</div>
    <div class="header-sub">Trade Journal — XAU/USD · Cloud Synced</div>
  </div>
  <div class="header-right">
    <span class="sync-status" id="sync-status">Connecting...</span>
    <span style="font-size:11px;color:var(--muted)" id="total-count">—</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log')">Log Trade</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <button class="tab" onclick="switchTab('analysis')">Analysis</button>
</div>

<div class="main">

  <!-- LOG TRADE -->
  <div id="tab-log" class="tab-content active">
    <div class="card">
      <div class="card-title">Trade Details</div>
      <div class="form-grid three">
        <div class="form-group"><label>Date</label><input type="date" id="t-date"></div>
        <div class="form-group"><label>Direction</label>
          <select id="t-dir"><option value="Long">Long (Buy)</option><option value="Short">Short (Sell)</option></select>
        </div>
        <div class="form-group"><label>Result</label>
          <select id="t-result"><option value="Win">Win</option><option value="Loss">Loss</option><option value="Breakeven">Breakeven</option></select>
        </div>
        <div class="form-group"><label>Entry Price ($)</label><input type="number" id="t-entry" placeholder="4200"></div>
        <div class="form-group"><label>Exit Price ($)</label><input type="number" id="t-exit" placeholder="4250"></div>
        <div class="form-group"><label>P&amp;L in $ (+ or -)</label><input type="number" id="t-pnl" placeholder="-75 or +150"></div>
        <div class="form-group"><label>Risk ($)</label><input type="number" id="t-risk" placeholder="25"></div>
        <div class="form-group"><label>RR Achieved</label><input type="number" id="t-rr" placeholder="2.0" step="0.1"></div>
        <div class="form-group"><label>Confirmation Candle</label>
          <select id="t-candle">
            <option value="Pin Bar">Pin Bar</option>
            <option value="Engulfing">Engulfing</option>
            <option value="Other">Other</option>
            <option value="None">None — entered early</option>
          </select>
        </div>
      </div>
      <div class="form-grid" style="margin-top:10px">
        <div class="form-group"><label>Session</label>
          <select id="t-session">
            <option value="London">London</option>
            <option value="New York">New York</option>
            <option value="Asian">Asian</option>
            <option value="London/NY Overlap">London/NY Overlap</option>
          </select>
        </div>
        <div class="form-group"><label>Trend (EMA 200)</label>
          <select id="t-trend">
            <option value="With Trend">With Trend ✅</option>
            <option value="Against Trend">Against Trend ❌</option>
          </select>
        </div>
        <div class="form-group full"><label>Notes / What happened</label>
          <textarea id="t-notes" placeholder="What setup was this? What did you do right or wrong?"></textarea>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Rules Checklist — Did you follow these?</div>
      <div class="rules-grid" id="rules-check"></div>
    </div>
    <button class="btn" id="save-btn" onclick="saveTrade()">💾 Save Trade</button>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-content">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Win',this)">Wins</button>
      <button class="filter-btn" onclick="setFilter('Loss',this)">Losses</button>
      <button class="filter-btn" onclick="setFilter('Against Trend',this)">Against Trend</button>
      <button class="filter-btn" onclick="setFilter('broken',this)">Rule Broken</button>
    </div>
    <div id="trade-list"><div class="empty"><span class="loader"></span> Loading trades...</div></div>
  </div>

  <!-- ANALYSIS -->
  <div id="tab-analysis" class="tab-content">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setPeriod('all',this)">All Time</button>
      <button class="filter-btn" onclick="setPeriod('week',this)">This Week</button>
      <button class="filter-btn" onclick="setPeriod('month',this)">This Month</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="card">
      <div class="card-title">Rule Consistency — which rules you break most</div>
      <div id="rule-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">Monthly Breakdown</div>
      <table class="month-table">
        <thead><tr><th>Month</th><th>Trades</th><th>Wins</th><th>Win %</th><th>Net P&amp;L</th><th>Consistency %</th></tr></thead>
        <tbody id="month-body"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">
      <span>✏️ Edit Trade</span>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="form-grid three">
      <div class="form-group"><label>Date</label><input type="date" id="e-date"></div>
      <div class="form-group"><label>Direction</label>
        <select id="e-dir"><option value="Long">Long (Buy)</option><option value="Short">Short (Sell)</option></select>
      </div>
      <div class="form-group"><label>Result</label>
        <select id="e-result"><option value="Win">Win</option><option value="Loss">Loss</option><option value="Breakeven">Breakeven</option></select>
      </div>
      <div class="form-group"><label>Entry Price ($)</label><input type="number" id="e-entry"></div>
      <div class="form-group"><label>Exit Price ($)</label><input type="number" id="e-exit"></div>
      <div class="form-group"><label>P&amp;L in $ (+ or -)</label><input type="number" id="e-pnl"></div>
      <div class="form-group"><label>Risk ($)</label><input type="number" id="e-risk"></div>
      <div class="form-group"><label>RR Achieved</label><input type="number" id="e-rr" step="0.1"></div>
      <div class="form-group"><label>Confirmation Candle</label>
        <select id="e-candle">
          <option value="Pin Bar">Pin Bar</option>
          <option value="Engulfing">Engulfing</option>
          <option value="Other">Other</option>
          <option value="None">None — entered early</option>
        </select>
      </div>
    </div>
    <div class="form-grid" style="margin-top:10px">
      <div class="form-group"><label>Session</label>
        <select id="e-session">
          <option value="London">London</option>
          <option value="New York">New York</option>
          <option value="Asian">Asian</option>
          <option value="London/NY Overlap">London/NY Overlap</option>
        </select>
      </div>
      <div class="form-group"><label>Trend (EMA 200)</label>
        <select id="e-trend">
          <option value="With Trend">With Trend ✅</option>
          <option value="Against Trend">Against Trend ❌</option>
        </select>
      </div>
      <div class="form-group full"><label>Notes</label>
        <textarea id="e-notes"></textarea>
      </div>
    </div>
    <div class="card-title" style="margin-top:14px">Rules Checklist</div>
    <div class="rules-grid" id="edit-rules-check"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn" id="edit-save-btn" onclick="saveEdit()" style="flex:1;margin-top:0">💾 Save Changes</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const SUPABASE_URL = 'https://cqdrdpqfpovdbgajjvnt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gzVhIHLeTdB6Nj1rdi907A_DT52A1jX';
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Prefer': 'return=representation'
};

const RULES = [
  "EMA 200 direction checked",
  "Trade is WITH the trend",
  "Waited for candle confirmation",
  "One entry only — no adding",
  "SL placed before entry",
  "No news in 30 min window",
  "Daily loss under $80",
  "RR minimum 1:2"
];

let trades = [];
let currentFilter = 'all';
let currentPeriod = 'all';

// ── SUPABASE API ──────────────────────────────────────────
async function fetchTrades() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/trades?order=id.desc`, { headers: HEADERS });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    // parse rules from jsonb
    trades = data.map(t => ({ ...t, rules: Array.isArray(t.rules) ? t.rules : JSON.parse(t.rules || '[]') }));
    setSync('✓ Connected', true);
    return true;
  } catch(e) {
    setSync('⚠ Connection failed', false);
    showToast('Could not load trades: ' + e.message, true);
    return false;
  }
}

async function insertTrade(trade) {
  const payload = { ...trade, rules: JSON.stringify(trade.rules) };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/trades`, {
    method: 'POST', headers: HEADERS, body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error(await res.text());
  return await res.json();
}

async function deleteTradeSB(id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/trades?id=eq.${id}`, {
    method: 'DELETE', headers: HEADERS
  });
  if (!res.ok) throw new Error(await res.text());
}

// ── UI HELPERS ────────────────────────────────────────────
function setSync(msg, ok) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status ' + (ok ? 'ok' : 'err');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--red)' : 'var(--green)';
  t.style.color = isError ? '#fff' : '#000';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── RULES ─────────────────────────────────────────────────
function buildRulesCheck() {
  document.getElementById('rules-check').innerHTML = RULES.map((r, i) => `
    <div class="rule-item" id="rc-${i}" onclick="toggleRule(${i})">
      <div class="rule-dot" id="rd-${i}"></div>
      <div class="rule-text">${r}</div>
    </div>`).join('');
}

function toggleRule(i) { document.getElementById('rc-'+i).classList.toggle('checked'); }
function getRulesState() { return RULES.map((_, i) => document.getElementById('rc-'+i).classList.contains('checked')); }
function resetRules() { RULES.forEach((_, i) => document.getElementById('rc-'+i).classList.remove('checked')); }

// ── SAVE TRADE ────────────────────────────────────────────
async function saveTrade() {
  const date  = document.getElementById('t-date').value;
  const entry = document.getElementById('t-entry').value;
  const pnl   = document.getElementById('t-pnl').value;
  if (!date || !entry || !pnl) { showToast('Fill in Date, Entry and P&L', true); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Saving...';

  const trade = {
    id:      Date.now(),
    date,
    dir:     document.getElementById('t-dir').value,
    result:  document.getElementById('t-result').value,
    entry:   parseFloat(entry),
    exit:    parseFloat(document.getElementById('t-exit').value) || 0,
    pnl:     parseFloat(pnl),
    risk:    parseFloat(document.getElementById('t-risk').value) || 0,
    rr:      parseFloat(document.getElementById('t-rr').value) || 0,
    candle:  document.getElementById('t-candle').value,
    session: document.getElementById('t-session').value,
    trend:   document.getElementById('t-trend').value,
    notes:   document.getElementById('t-notes').value,
    rules:   getRulesState()
  };

  try {
    await insertTrade(trade);
    trades.unshift(trade);
    ['t-entry','t-exit','t-pnl','t-risk','t-rr','t-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('t-date').value = new Date().toISOString().slice(0,10);
    resetRules();
    updateAll();
    showToast('✓ Trade saved to cloud!');
    switchTab('history');
  } catch(e) {
    showToast('Save failed: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 Save Trade';
  }
}

// ── DELETE ────────────────────────────────────────────────
async function deleteTrade(id) {
  if (!confirm('Delete this trade? Cannot be undone.')) return;
  try {
    await deleteTradeSB(id);
    trades = trades.filter(t => t.id !== id);
    updateAll();
    showToast('Trade deleted');
  } catch(e) {
    showToast('Delete failed: ' + e.message, true);
  }
}

// ── FILTER ────────────────────────────────────────────────
function filterByPeriod(list) {
  if (currentPeriod === 'all') return list;
  const now = new Date();
  return list.filter(t => {
    const d = new Date(t.date);
    if (currentPeriod === 'week')  { const w = new Date(now); w.setDate(now.getDate()-7); return d >= w; }
    if (currentPeriod === 'month') { return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); }
    return true;
  });
}

// ── RENDER HISTORY ────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('trade-list');
  let list = [...trades];
  if (currentFilter === 'Win')            list = list.filter(t => t.result==='Win');
  else if (currentFilter === 'Loss')      list = list.filter(t => t.result==='Loss');
  else if (currentFilter==='Against Trend') list = list.filter(t => t.trend==='Against Trend');
  else if (currentFilter === 'broken')    list = list.filter(t => t.rules && t.rules.some(r=>!r));

  if (!list.length) { el.innerHTML = '<div class="empty">No trades found. Log your first trade! 📊</div>'; return; }

  el.innerHTML = list.map(t => {
    const brokenRules   = RULES.filter((_,i) => t.rules && !t.rules[i]);
    const followedRules = RULES.filter((_,i) => t.rules && t.rules[i]);
    const consistency   = t.rules ? Math.round(t.rules.filter(Boolean).length/RULES.length*100) : 0;
    const pnlColor      = t.pnl>0?'green-text':t.pnl<0?'red-text':'';
    const resultBadge   = t.result==='Win'?'badge-win':t.result==='Loss'?'badge-loss':'badge-be';
    const dirBadge      = t.dir==='Long'?'badge-long':'badge-short';
    const trendWarn     = t.trend==='Against Trend'?'<span style="font-size:10px;color:var(--red)">⚠️ Against Trend</span>':'';
    const cColor        = consistency>=75?'var(--green)':consistency>=50?'var(--gold)':'var(--red)';
    return `
      <div class="trade-item">
        <div class="trade-header">
          <div class="trade-meta">
            <span class="trade-date">${t.date}</span>
            <span class="badge ${dirBadge}">${t.dir}</span>
            <span class="badge ${resultBadge}">${t.result}</span>
            <span style="font-size:11px;color:var(--muted)">${t.session||''}</span>
            ${trendWarn}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="trade-pips ${pnlColor}">${t.pnl>0?'+':''}$${t.pnl}</span>
            <button class="edit-btn" onclick="openEdit(${t.id})" title="Edit">✏️</button>
            <button class="delete-btn" onclick="deleteTrade(${t.id})">✕</button>
          </div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">
          Entry: $${t.entry} → Exit: $${t.exit||'—'} &nbsp;|&nbsp; RR: ${t.rr||'—'}:1 &nbsp;|&nbsp; Candle: ${t.candle||'—'} &nbsp;|&nbsp;
          Rules: <span style="color:${cColor};font-weight:600">${consistency}%</span>
        </div>
        <div class="trade-rules">
          ${followedRules.map(r=>`<span class="rule-badge rule-ok">✓ ${r}</span>`).join('')}
          ${brokenRules.map(r=>`<span class="rule-badge rule-broken">✗ ${r}</span>`).join('')}
        </div>
        ${t.notes?`<div class="trade-note">"${t.notes}"</div>`:''}
      </div>`;
  }).join('');
}

// ── RENDER ANALYSIS ───────────────────────────────────────
function renderAnalysis() {
  const list    = filterByPeriod(trades);
  const wins    = list.filter(t=>t.result==='Win');
  const totalPnl= list.reduce((s,t)=>s+(t.pnl||0),0);
  const wr      = list.length ? Math.round(wins.length/list.length*100) : 0;
  const avgRR   = list.length ? (list.reduce((s,t)=>s+(t.rr||0),0)/list.length).toFixed(1) : 0;
  const withTrend = list.filter(t=>t.trend==='With Trend').length;
  const trendPct  = list.length ? Math.round(withTrend/list.length*100) : 0;
  let tC=0,tP=0;
  list.forEach(t=>{if(t.rules){tC+=t.rules.filter(Boolean).length;tP+=RULES.length;}});
  const overallC = tP ? Math.round(tC/tP*100) : 0;
  const cColor   = overallC>=75?'green-text':overallC>=50?'gold-text':'red-text';
  const pnlColor = totalPnl>=0?'green-text':'red-text';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-val gold-text">${list.length}</div><div class="stat-label">Total Trades</div></div>
    <div class="stat"><div class="stat-val ${wr>=50?'green-text':'red-text'}">${wr}%</div><div class="stat-label">Win Rate</div></div>
    <div class="stat"><div class="stat-val ${pnlColor}">${totalPnl>=0?'+':''}$${totalPnl.toFixed(0)}</div><div class="stat-label">Net P&L</div></div>
    <div class="stat"><div class="stat-val blue-text">${avgRR}:1</div><div class="stat-label">Avg RR</div></div>
    <div class="stat"><div class="stat-val ${cColor}">${overallC}%</div><div class="stat-label">Consistency</div></div>
    <div class="stat"><div class="stat-val ${trendPct>=80?'green-text':'red-text'}">${trendPct}%</div><div class="stat-label">With Trend</div></div>`;

  document.getElementById('rule-bars').innerHTML = RULES.map((rule,i) => {
    const app = list.filter(t=>t.rules);
    const fol = app.filter(t=>t.rules[i]).length;
    const pct = app.length ? Math.round(fol/app.length*100) : 0;
    const col = pct>=80?'var(--green)':pct>=50?'var(--gold)':'var(--red)';
    return `<div class="rule-row">
      <div class="rule-name">${rule}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="rule-pct" style="color:${col}">${pct}%</div>
    </div>`;
  }).join('');

  const months = {};
  trades.forEach(t => {
    const key = (t.date||'').slice(0,7)||'Unknown';
    if(!months[key]) months[key]=[];
    months[key].push(t);
  });

  document.getElementById('month-body').innerHTML = Object.entries(months)
    .sort((a,b)=>b[0].localeCompare(a[0]))
    .map(([month,mT]) => {
      const mW=mT.filter(t=>t.result==='Win').length;
      const mPnl=mT.reduce((s,t)=>s+(t.pnl||0),0);
      const mWr=Math.round(mW/mT.length*100);
      let mC=0,mP=0;
      mT.forEach(t=>{if(t.rules){mC+=t.rules.filter(Boolean).length;mP+=RULES.length;}});
      const mCon=mP?Math.round(mC/mP*100):0;
      return `<tr>
        <td style="font-weight:500">${month}</td><td>${mT.length}</td><td>${mW}</td>
        <td style="color:${mWr>=50?'var(--green)':'var(--red)'}">${mWr}%</td>
        <td style="color:${mPnl>=0?'var(--green)':'var(--red)'};font-weight:500">${mPnl>=0?'+':''}$${mPnl.toFixed(0)}</td>
        <td style="color:${mCon>=75?'var(--green)':mCon>=50?'var(--gold)':'var(--red)'};font-weight:500">${mCon}%</td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">No trades yet</td></tr>';
}

function updateAll() {
  document.getElementById('total-count').textContent = `${trades.length} trade${trades.length!==1?'s':''}`;
  renderHistory();
  renderAnalysis();
}

function switchTab(name) {
  ['log','history','analysis'].forEach((t,i) => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.querySelectorAll('.tab')[i].classList.toggle('active', t===name);
  });
}

function setFilter(f,el) {
  currentFilter=f;
  document.querySelectorAll('#tab-history .filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderHistory();
}

function setPeriod(p,el) {
  currentPeriod=p;
  document.querySelectorAll('#tab-analysis .filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderAnalysis();
}

// ── EDIT MODAL ────────────────────────────────────────────
let editingId = null;

function buildEditRules() {
  document.getElementById('edit-rules-check').innerHTML = RULES.map((r,i) => `
    <div class="rule-item" id="erc-${i}" onclick="toggleEditRule(${i})">
      <div class="rule-dot" id="erd-${i}"></div>
      <div class="rule-text">${r}</div>
    </div>`).join('');
}

function toggleEditRule(i) { document.getElementById('erc-'+i).classList.toggle('checked'); }

function setEditRules(rulesArr) {
  RULES.forEach((_,i) => {
    const el = document.getElementById('erc-'+i);
    if (rulesArr && rulesArr[i]) el.classList.add('checked');
    else el.classList.remove('checked');
  });
}

function getEditRules() {
  return RULES.map((_,i) => document.getElementById('erc-'+i).classList.contains('checked'));
}

function openEdit(id) {
  const t = trades.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('e-date').value   = t.date || '';
  document.getElementById('e-dir').value    = t.dir || 'Long';
  document.getElementById('e-result').value = t.result || 'Win';
  document.getElementById('e-entry').value  = t.entry || '';
  document.getElementById('e-exit').value   = t.exit || '';
  document.getElementById('e-pnl').value    = t.pnl || '';
  document.getElementById('e-risk').value   = t.risk || '';
  document.getElementById('e-rr').value     = t.rr || '';
  document.getElementById('e-candle').value = t.candle || 'Pin Bar';
  document.getElementById('e-session').value= t.session || 'London';
  document.getElementById('e-trend').value  = t.trend || 'With Trend';
  document.getElementById('e-notes').value  = t.notes || '';
  setEditRules(t.rules);
  document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
  editingId = null;
  document.getElementById('edit-modal').classList.remove('open');
}

async function saveEdit() {
  if (!editingId) return;
  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Saving...';

  const updated = {
    id:      editingId,
    date:    document.getElementById('e-date').value,
    dir:     document.getElementById('e-dir').value,
    result:  document.getElementById('e-result').value,
    entry:   parseFloat(document.getElementById('e-entry').value) || 0,
    exit:    parseFloat(document.getElementById('e-exit').value) || 0,
    pnl:     parseFloat(document.getElementById('e-pnl').value) || 0,
    risk:    parseFloat(document.getElementById('e-risk').value) || 0,
    rr:      parseFloat(document.getElementById('e-rr').value) || 0,
    candle:  document.getElementById('e-candle').value,
    session: document.getElementById('e-session').value,
    trend:   document.getElementById('e-trend').value,
    notes:   document.getElementById('e-notes').value,
    rules:   getEditRules()
  };

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/trades?id=eq.${editingId}`, {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify({ ...updated, rules: JSON.stringify(updated.rules) })
    });
    if (!res.ok) throw new Error(await res.text());
    const idx = trades.findIndex(t => t.id === editingId);
    if (idx !== -1) trades[idx] = updated;
    closeEdit();
    updateAll();
    showToast('✓ Trade updated!');
  } catch(e) {
    showToast('Update failed: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 Save Changes';
  }
}

// close modal when clicking outside
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

// ── INIT ──────────────────────────────────────────────────
async function init() {
  document.getElementById('t-date').value = new Date().toISOString().slice(0,10);
  buildRulesCheck();
  buildEditRules();
  setSync('Connecting...', false);
  await fetchTrades();
  updateAll();
}

init();
</script>
